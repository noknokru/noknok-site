<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Портфолио — Нокнок</title>
<link rel="stylesheet" href="styles/main.css">
<style>
/* ─── СПИСОК ПРОЕКТОВ ─── */
.blog-list { padding-top: 32px; display: flex; flex-direction: column; }

.bc {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  column-gap: var(--gap);
  align-items: start;
  padding: 56px 0;
  text-decoration: none;
  transition: opacity 0.15s;
}
.bc:hover { opacity: 0.65; }

.bc-img {
  background: #d5d5d5;
  border-radius: var(--r-card);
}

.bc-title {
  font-size: var(--fs-body);
  font-weight: 500;
  line-height: 1.4;
  color: var(--c-ink);
}
.bc-tag {
  font-size: var(--fs-label);
  letter-spacing: var(--ls-label);
  text-transform: uppercase;
  color: var(--c-ink-3);
  margin-bottom: 10px;
}

/* ── Тип 1: картинка (3–11) по центру строка 1 | текст (3–7) левый край строка 2 ── */
.bc--1 .bc-img  { grid-column: 3 / 11; grid-row: 1; height: 480px; }
.bc--1 .bc-text { grid-column: 3 / 7;  grid-row: 2; padding-top: 24px; }

/* ── Тип 2: картинка (5–8) строка 1 | текст (5–8) строка 2 ── */
.bc--2 .bc-img  { grid-column: 5 / 9;  grid-row: 1; height: 480px; }
.bc--2 .bc-text { grid-column: 5 / 9;  grid-row: 2; padding-top: 24px; }

/* ── Тип 3: картинка (3–11) строка 1 центр | текст (5–8) строка 2 ── */
.bc--3 .bc-img  { grid-column: 3 / 11; grid-row: 1; height: 480px; }
.bc--3 .bc-text { grid-column: 5 / 9;  grid-row: 2; padding-top: 24px; }

/* ── Тип 4: картинка (1–12) строка 1 | текст (5–8) строка 2 ── */
.bc--4 .bc-img  { grid-column: 1 / 13; grid-row: 1; height: 560px; }
.bc--4 .bc-text { grid-column: 5 / 9;  grid-row: 2; padding-top: 24px; }
</style>
</head>
<body>

<div id="hero-root"></div>

<div class="section">
  <div class="blog-list col-full">

    <!-- Тип 1: картинка (3–11) по центру строка 1, текст (3–7) левый край строка 2 -->
    <a class="bc bc--1" href="case-1.html">
      <div class="bc-img"></div>
      <div class="bc-text">
        <div class="bc-tag">Брендинг · Интерфейсы</div>
        <p class="bc-title">Урбика — путеводитель по городу для детей и родителей</p>
      </div>
    </a>

    <!-- Тип 2: картинка (5–8) строка 1, текст (5–8) строка 2 -->
    <a class="bc bc--2" href="case-2.html">
      <div class="bc-img"></div>
      <div class="bc-text">
        <p class="bc-title">Редизайн платформы для управления командой</p>
      </div>
    </a>

    <!-- Тип 3: картинка (3–11) строка 1 по центру, текст (5–8) строка 2 -->
    <a class="bc bc--3" href="case-3.html">
      <div class="bc-img"></div>
      <div class="bc-text">
        <p class="bc-title">Мобильное приложение для онлайн-записи</p>
      </div>
    </a>

  </div>
</div>

<script src="components/navbar.js"></script>
<script src="components/hero.js"></script>
<script src="components/cta.js"></script>
<script>
renderHero({ title: 'Портфолио' });

const hero    = document.getElementById('hero');
const leftnav = document.getElementById('leftnav');
const copy    = document.getElementById('copyright');
const topnav  = document.getElementById('topnav');

function onScroll() {
  const maxScroll = document.documentElement.scrollHeight - window.innerHeight;
  const progress = maxScroll > 0 ? Math.max(0, Math.min(window.scrollY / maxScroll * 100, 100)) : 0;
  topnav.style.setProperty('--scroll', progress.toFixed(2) + '%');
  const pastHero = window.scrollY > hero.offsetHeight * 0.85;
  leftnav.classList.toggle('dark', pastHero);
  copy.classList.toggle('dark', pastHero);
}
window.addEventListener('scroll', onScroll, { passive: true });
onScroll();
</script>
</body>
</html>
